<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Settings — Polished</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; background: #f8f9fa; color: #111; line-height: 1.5; }

  /* Page shell */
  .shell { max-width: 900px; margin: 0 auto; background: white; min-height: 100vh; border-left: 1px solid #eee; border-right: 1px solid #eee; }

  /* Header bar */
  .header { display: flex; align-items: center; height: 48px; padding: 0 20px; border-bottom: 1px solid #eee; }
  .trigger-icon { width: 22px; height: 22px; border: 1px solid #ddd; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #999; font-size: 11px; }
  .header-sep { width: 1px; height: 16px; background: #ddd; margin: 0 10px; }
  .header-title { font-size: 14px; font-weight: 500; color: #111; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .bell-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #888; position: relative; }
  .bell-icon:hover { background: #f5f5f5; }
  .bell-icon svg { width: 16px; height: 16px; }

  /* Content */
  .content { padding: 28px 32px; max-width: 560px; }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1px solid #eee; }
  .tab { padding: 10px 16px; font-size: 13px; font-weight: 500; color: #999; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s; }
  .tab:hover { color: #666; }
  .tab.active { color: #111; border-bottom-color: #111; }
  .tab.disabled { color: #ddd; cursor: default; }
  .tab.disabled:hover { color: #ddd; }

  /* Profile header card */
  .profile-card { display: flex; gap: 16px; padding: 20px; background: #fafafa; border: 1px solid #eee; border-radius: 10px; margin-bottom: 28px; align-items: center; }
  .logo-area { width: 64px; height: 64px; border-radius: 12px; background: #f0fdfa; border: 1px solid #ccfbf1; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: #0d9488; cursor: pointer; flex-shrink: 0; position: relative; overflow: hidden; }
  .logo-area:hover .logo-overlay { opacity: 1; }
  .logo-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: 500; letter-spacing: 0.03em; opacity: 0; transition: opacity 0.15s; }
  .profile-info { flex: 1; min-width: 0; }
  .profile-name { font-size: 16px; font-weight: 600; color: #111; }
  .profile-url { font-size: 12px; color: #999; font-family: 'SF Mono', 'Cascadia Code', monospace; margin-top: 1px; }

  /* Form */
  .form-section { margin-bottom: 24px; }
  .form-section-label { font-size: 12px; font-weight: 600; color: #333; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.04em; }

  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }
  .field-label { font-size: 13px; font-weight: 500; color: #333; margin-bottom: 6px; display: block; }
  .field-input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 14px; font-family: inherit; outline: none; color: #111; transition: border-color 0.15s, box-shadow 0.15s; }
  .field-input:focus { border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
  .field-textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 14px; font-family: inherit; outline: none; min-height: 80px; resize: vertical; color: #111; transition: border-color 0.15s, box-shadow 0.15s; }
  .field-textarea:focus { border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
  .field-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .field-hint { font-size: 12px; color: #999; }
  .field-count { font-size: 12px; color: #ccc; }

  /* Social links */
  .social-links { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .social-row { display: flex; align-items: center; height: 42px; }
  .social-prefix { width: 108px; height: 42px; background: #f9f9f9; border: 1px solid #ddd; border-right: none; border-radius: 8px 0 0 8px; padding: 0 12px; font-size: 13px; color: #555; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .social-prefix .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .social-input { flex: 1; height: 42px; border: 1px solid #ddd; border-radius: 0 8px 8px 0; padding: 0 14px; font-size: 14px; font-family: inherit; outline: none; color: #111; }
  .social-input:focus { border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
  .social-remove { width: 36px; height: 42px; display: flex; align-items: center; justify-content: center; color: #ddd; cursor: pointer; font-size: 16px; flex-shrink: 0; transition: color 0.15s; }
  .social-remove:hover { color: #ef4444; }

  .add-link { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; color: #0d9488; cursor: pointer; font-weight: 500; }
  .add-link:hover { text-decoration: underline; }

  /* Actions bar */
  .actions { display: flex; justify-content: space-between; align-items: center; padding-top: 24px; margin-top: 28px; border-top: 1px solid #eee; }
  .btn { padding: 10px 18px; font-size: 13px; font-weight: 500; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn-primary { background: #0d9488; color: white; }
  .btn-primary:hover { background: #0f766e; }
  .btn-danger { background: transparent; border: 1px solid #fca5a5; color: #dc2626; padding: 9px 17px; }
  .btn-danger:hover { background: #fef2f2; }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="trigger-icon">☰</div>
    <div class="header-sep"></div>
    <div class="header-title">Settings</div>
    <div class="header-right">
      <div class="bell-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"/></svg>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="tabs">
      <div class="tab active">Profile</div>
      <div class="tab disabled">Permissions</div>
      <div class="tab disabled">Notifications</div>
    </div>

    <!-- Profile preview -->
    <div class="profile-card">
      <div class="logo-area">
        V
        <div class="logo-overlay">Change</div>
      </div>
      <div class="profile-info">
        <div class="profile-name">VGC League</div>
        <div class="profile-url">trainers.gg/communities/vgc-league</div>
      </div>
    </div>

    <!-- Fields -->
    <div class="form-section">
      <div class="field">
        <label class="field-label">Community Name</label>
        <input class="field-input" value="VGC League">
      </div>

      <div class="field">
        <label class="field-label">Description</label>
        <textarea class="field-textarea">Pokemon VGC Tournament Organization for competitive players</textarea>
        <div class="field-footer">
          <span class="field-hint">Shown on your public community page</span>
          <span class="field-count">54 / 500</span>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-label">Social Links</div>
      <div class="social-links">
        <div class="social-row">
          <div class="social-prefix"><div class="dot" style="background:#5865F2"></div> Discord</div>
          <input class="social-input" value="discord.gg/vgcleague">
          <div class="social-remove">×</div>
        </div>
        <div class="social-row">
          <div class="social-prefix"><div class="dot" style="background:#111"></div> X</div>
          <input class="social-input" value="@vgcleague">
          <div class="social-remove">×</div>
        </div>
      </div>
      <div class="add-link">+ Add link</div>
    </div>

    <div class="actions">
      <button class="btn btn-danger">Delete community</button>
      <button class="btn btn-primary">Save changes</button>
    </div>
  </div>
</div>
</body>
</html>
