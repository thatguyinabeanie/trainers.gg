<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="line-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5ed5c4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#5ed5c4" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="line-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5ed5c4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#5ed5c4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5ed5c4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5ed5c4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#5ed5c4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="#0a0a0a"/>

  <!-- Decorative background accents -->
  <rect x="86" y="302" width="120" height="1" fill="url(#accent-left)"/>
  <rect x="874" y="778" width="120" height="1" fill="url(#accent-left)"/>

  <!-- Logo line accents -->
  <rect x="310" y="430" width="100" height="1" fill="url(#line-left)"/>
  <rect x="670" y="430" width="100" height="1" fill="url(#line-right)"/>

  <!-- Logo -->
  <text x="540" y="442" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#5ed5c4" letter-spacing="-2.5">trainers.gg</text>

  <!-- Tagline -->
  <text x="540" y="484" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#777777">Made for the community. Built to grow.</text>

  <!-- Now Live header -->
  <text x="540" y="564" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#5ed5c4" letter-spacing="3">NOW LIVE</text>

  <!-- Live features -->
  <text x="540" y="592" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#5ed5c4" fill-opacity="0.73" letter-spacing="0.3">
    <tspan>Trainer Profiles</tspan>
    <tspan fill="#5ed5c4" fill-opacity="0.27"> · </tspan>
    <tspan fill="#5ed5c4" fill-opacity="0.73">Tournaments</tspan>
    <tspan fill="#5ed5c4" fill-opacity="0.27"> · </tspan>
    <tspan fill="#5ed5c4" fill-opacity="0.73">Community</tspan>
  </text>

  <!-- Coming Soon header -->
  <text x="540" y="648" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#444444" letter-spacing="3">COMING SOON</text>

  <!-- Coming Soon features -->
  <text x="540" y="676" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#3a3a3a" letter-spacing="0.3">
    <tspan>Articles</tspan>
    <tspan fill="#2a2a2a"> · </tspan>
    <tspan fill="#3a3a3a">Coaching</tspan>
    <tspan fill="#2a2a2a"> · </tspan>
    <tspan fill="#3a3a3a">Smart Team Builder</tspan>
    <tspan fill="#2a2a2a"> · </tspan>
    <tspan fill="#3a3a3a">Analytics</tspan>
  </text>
</svg>
