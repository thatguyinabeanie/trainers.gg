name: Check Branch DB Readiness
description: Checks if a Vercel preview deployment is connected to a Supabase branch DB (not production).

inputs:
  preview-url:
    description: The preview deployment URL
    required: true
  bypass-secret:
    description: Vercel automation bypass secret
    required: true

outputs:
  ready:
    description: '"true" if branch DB is ready, "false" otherwise'
    value: ${{ steps.check.outputs.ready }}
  curl_failed:
    description: '"true" if curl completely failed (infrastructure error), "false" if endpoint responded'
    value: ${{ steps.check.outputs.curl_failed }}

runs:
  using: composite
  steps:
    - name: Check branch DB
      id: check
      shell: bash
      env:
        PREVIEW_URL: ${{ inputs.preview-url }}
        BYPASS_SECRET: ${{ inputs.bypass-secret }}
      run: |
        CURL_ERR=$(mktemp)
        RESPONSE=$(curl -sS --max-time 10 \
          -H "x-vercel-protection-bypass: $BYPASS_SECRET" \
          "$PREVIEW_URL/api/e2e/seed" 2>"$CURL_ERR") || RESPONSE=""

        if [ -z "$RESPONSE" ]; then
          echo "curl error: $(cat "$CURL_ERR")"
          rm -f "$CURL_ERR"
          echo "::error::Infrastructure error: Could not reach seed endpoint for branch DB check"
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "curl_failed=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        rm -f "$CURL_ERR"
        SAFE=$(echo "$RESPONSE" | jq -r '.safe // false')
        REASON=$(echo "$RESPONSE" | jq -r '.reason // empty')

        if [ "$SAFE" = "true" ]; then
          echo "Supabase branch DB is ready"
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "curl_failed=false" >> "$GITHUB_OUTPUT"
        else
          echo "::warning::Supabase branch DB not available: $REASON"
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "curl_failed=false" >> "$GITHUB_OUTPUT"
        fi
