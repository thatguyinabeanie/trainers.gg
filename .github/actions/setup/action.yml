name: Setup Node & Dependencies
description: Shared setup for CI jobs — restores node_modules, configures pnpm/node, sets up Turbo cache.

inputs:
  node-modules-cache-key:
    description: Cache key from the install job
    required: true
  turbo-prefix:
    description: Job-specific prefix for the Turbo cache key (e.g. "quality", "test-web")
    required: true
  vercel-token:
    description: Vercel token (also used for Turbo remote cache)
    required: false
  vercel-team-id:
    description: Vercel team slug or ID — used for both Vercel API and TURBO_TEAM (Turbo accepts either format)
    required: false

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v5

    - uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: pnpm

    - name: Restore node_modules
      uses: actions/cache/restore@v5
      with:
        path: |
          node_modules
          apps/*/node_modules
          packages/*/node_modules
          tooling/*/node_modules
        key: ${{ inputs.node-modules-cache-key }}
        fail-on-cache-miss: true

    - name: Restore workspace links
      shell: bash
      run: pnpm install --frozen-lockfile
      env:
        CI: "true"

    - name: Turbo cache
      uses: actions/cache@v5
      with:
        path: .turbo
        key: turbo-${{ inputs.turbo-prefix }}-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', 'turbo.json', '**/tsconfig.json', '**/jest.config.*') }}
        restore-keys: |
          turbo-${{ inputs.turbo-prefix }}-${{ runner.os }}-

    - name: Configure Turbo Remote Cache
      if: inputs.vercel-token != ''
      shell: bash
      # TURBO_TEAM accepts both team slug ("my-team") and team ID ("team_xxx").
      # We pass whichever value is in vercel-team-id — Turbo handles both formats.
      run: |
        echo "TURBO_TOKEN=${{ inputs.vercel-token }}" >> "$GITHUB_ENV"
        echo "TURBO_TEAM=${{ inputs.vercel-team-id }}" >> "$GITHUB_ENV"
