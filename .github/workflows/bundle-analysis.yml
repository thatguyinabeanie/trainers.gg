name: Bundle Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"

concurrency:
  group: bundle-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  pull-requests: write

defaults:
  run:
    working-directory: apps/web

jobs:
  analyze:
    name: Analyze Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6.0.9 # pinned: early v6 had lockfile/PATH bugs

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-
            turbo-${{ runner.os }}-

      - name: Restore node_modules cache
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            tooling/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Next.js build cache
        uses: actions/cache@v6
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ github.ref_name }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ github.ref_name }}-
            ${{ runner.os }}-nextjs-

      # Under cacheComponents, 'use cache' fetchers execute at build time
      # (prerender), so the build needs a reachable Supabase — a placeholder
      # URL makes every cached fetch reject and aborts page exports.
      - name: Start local Supabase
        working-directory: packages/supabase
        run: |
          pnpm supabase start
          pnpm supabase status -o env | tr -d '"' > /tmp/supabase-status.env
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$(grep '^API_URL=' /tmp/supabase-status.env | cut -d= -f2-)"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(grep '^ANON_KEY=' /tmp/supabase-status.env | cut -d= -f2-)"
            echo "SUPABASE_SERVICE_ROLE_KEY=$(grep '^SERVICE_ROLE_KEY=' /tmp/supabase-status.env | cut -d= -f2-)"
          } >> "$GITHUB_ENV"

      - name: Build Next.js app
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Analyze bundle
        run: npx -p nextjs-bundle-analysis report

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v7
        with:
          name: bundle-analysis
          path: apps/web/.next/analyze/__bundle_analysis.json

      - name: Download base branch bundle
        uses: dawidd6/action-download-artifact@v21
        if: success() && github.event_name == 'pull_request'
        with:
          workflow: bundle-analysis.yml
          branch: ${{ github.event.pull_request.base.ref }}
          path: apps/web/.next/analyze/base
        continue-on-error: true

      - name: Compare with base branch
        if: success() && github.event_name == 'pull_request'
        run: ls -laR .next/analyze && npx -p nextjs-bundle-analysis compare
        continue-on-error: true

      - name: Get comment body
        id: get-comment-body
        if: success() && github.event_name == 'pull_request'
        run: |
          BODY=$(cat .next/analyze/__bundle_analysis_comment.txt)
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Find existing comment
        uses: peter-evans/find-comment@v4
        if: success() && github.event_name == 'pull_request'
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: Next.js Bundle Analysis

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v5
        if: success() && github.event_name == 'pull_request' && steps.get-comment-body.outputs.body
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: ${{ steps.get-comment-body.outputs.body }}
