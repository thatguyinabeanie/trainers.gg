name: PR Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  cleanup-branch-db:
    name: Delete Supabase Branch
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Delete Supabase branch
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          GIT_BRANCH: ${{ github.head_ref }}
        run: |
          echo "Deleting Supabase branch for $GIT_BRANCH..."
          supabase branches delete "$GIT_BRANCH" --project-ref "$PROJECT_REF" || echo "No branch to delete (may not exist)"

      - name: Remove Vercel env vars
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          GIT_BRANCH: ${{ github.head_ref }}
        run: |
          # List env vars scoped to this branch and delete them
          ENV_VARS=$(curl -sf \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | jq -r --arg branch "$GIT_BRANCH" '.envs[] | select(.gitBranch == $branch) | .id')

          if [ -z "$ENV_VARS" ]; then
            echo "No branch-scoped env vars to clean up"
            exit 0
          fi

          for ID in $ENV_VARS; do
            curl -sf -X DELETE \
              "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env/$ID?teamId=$VERCEL_TEAM_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN"
            echo "Deleted env var $ID"
          done
          echo "Cleaned up env vars for $GIT_BRANCH"
