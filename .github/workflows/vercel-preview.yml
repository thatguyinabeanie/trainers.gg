name: Vercel Preview Deployment

# Triggers explicit CLI-driven Vercel preview deployments for PRs.
#
# Required GitHub secrets:
#   TURBO_TOKEN        — Vercel access token (reused from Turbo remote cache)
#   VERCEL_TEAM_ID     — from vercel.com → trainers-gg team → Settings → General (Team ID)
#   VERCEL_PROJECT_ID  — from vercel.com → trainers-gg → Settings → General (Project ID)
#
# After deploying, this workflow creates a GitHub Deployment resource so that the
# wait-for-preview job in ci.yml can find the preview URL via the Deployments API.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"
      - ".vscode/**"
      - "LICENSE"
      - ".gitignore"
      - "infra/**"
      - ".claude/**"

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    # Skip Dependabot PRs — they can't access secrets
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=preview --token=${{ secrets.TURBO_TOKEN }}

      - name: Build
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          CI: "true"
        run: vercel build --token=${{ secrets.TURBO_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.TURBO_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"

      # Explicitly register the deployment with GitHub so that wait-for-preview
      # in ci.yml can find it by polling repos/{owner}/{repo}/deployments?sha=...&environment=Preview
      - name: Register GitHub Deployment
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const sha = process.env.PR_HEAD_SHA;

            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              environment: 'Preview',
              auto_merge: false,
              required_contexts: [],
              description: 'Vercel Preview',
              transient_environment: true,
              production_environment: false,
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: 'success',
              environment_url: url,
              description: 'Preview ready',
              auto_inactive: true,
            });

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const prNumber = context.payload.pull_request.number;
            const body = `## Vercel Preview\n\n✅ [${url}](${url})`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.startsWith('## Vercel Preview'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
