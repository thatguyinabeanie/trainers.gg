name: actionlint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        env:
          # Pin the actionlint version rather than pulling tip-of-main, so a
          # new release can't change lint results out from under a PR.
          ACTIONLINT_VERSION: "1.7.7"
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) "$ACTIONLINT_VERSION"
          ./actionlint -color
