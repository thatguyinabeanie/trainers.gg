name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".vscode/**"
      - "LICENSE"
      - ".gitignore"
      - "infra/**"
      - ".claude/**"
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"
      - ".vscode/**"
      - "LICENSE"
      - ".gitignore"
      - "infra/**"
      - ".claude/**"

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: read
  pull-requests: write
  checks: write

jobs:
  # ── Shared dependency installation ─────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=node-modules-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}" >> "$GITHUB_OUTPUT"

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            tooling/*/node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
        env:
          CI: true
          GITHUB_ACTIONS: true

  # ── Quality checks (lint + typecheck) ──────────────────────
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: quality
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ secrets.TURBO_TEAM }}

      - name: ESLint cache
        uses: actions/cache@v5
        with:
          path: |
            apps/*/.eslintcache
            packages/*/.eslintcache
            tooling/*/.eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/.eslintrc.*', '**/eslint.config.*') }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            eslint-${{ runner.os }}-

      - name: TypeScript cache
        uses: actions/cache@v5
        with:
          path: |
            apps/*/tsconfig.tsbuildinfo
            packages/*/tsconfig.tsbuildinfo
            packages/*/dist/tsconfig.tsbuildinfo
          key: tsc-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/tsconfig*.json') }}
          restore-keys: |
            tsc-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            tsc-${{ runner.os }}-

      # Register problem matchers so ESLint and tsc errors become
      # inline annotations on the PR Files tab.
      - name: Register problem matchers
        run: |
          echo "::add-matcher::.github/matchers/eslint-stylish.json"
          echo "::add-matcher::.github/matchers/tsc.json"

      - name: Lint
        run: pnpm turbo run lint --log-prefix=none

      - name: Typecheck
        run: pnpm turbo run typecheck --log-prefix=none

  # ── Unit tests (Jest) — 3 jobs: web, mobile, packages ─────
  test-web:
    name: Test @trainers/web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: test-web
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ secrets.TURBO_TEAM }}

      - name: Jest cache
        uses: actions/cache@v5
        with:
          path: apps/web/.jest-cache
          key: jest-web-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('**/pnpm-lock.yaml', '**/jest.config.*', 'tooling/test-utils/jest-config.cjs') }}
          restore-keys: |
            jest-web-${{ runner.os }}-${{ github.ref }}-
            jest-web-${{ runner.os }}-refs/heads/main-

      - name: Run tests
        run: pnpm turbo run test --filter=@trainers/web --ui stream
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_CLASSNAME: "{classname}"
          JEST_JUNIT_TITLE: "{title}"
          JEST_JUNIT_ANCESTOR_SEPARATOR: " › "
          JEST_JUNIT_ADD_FILE_ATTRIBUTE: "true"

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "**/test-results/**/*.xml"
          check_name: Test Results / web
          comment_title: "Test Results / web"
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/coverage/lcov.info"
          fail_ci_if_error: false

  test-mobile:
    name: Test @trainers/mobile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: test-mobile
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ secrets.TURBO_TEAM }}

      - name: Jest cache
        uses: actions/cache@v5
        with:
          path: apps/mobile/.jest-cache
          key: jest-mobile-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('**/pnpm-lock.yaml', '**/jest.config.*', 'tooling/test-utils/jest-config.cjs') }}
          restore-keys: |
            jest-mobile-${{ runner.os }}-${{ github.ref }}-
            jest-mobile-${{ runner.os }}-refs/heads/main-

      - name: Run tests
        run: pnpm turbo run test --filter=@trainers/mobile --ui stream
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_CLASSNAME: "{classname}"
          JEST_JUNIT_TITLE: "{title}"
          JEST_JUNIT_ANCESTOR_SEPARATOR: " › "
          JEST_JUNIT_ADD_FILE_ATTRIBUTE: "true"

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "**/test-results/**/*.xml"
          check_name: Test Results / mobile
          comment_title: "Test Results / mobile"
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/coverage/lcov.info"
          fail_ci_if_error: false

  test-packages:
    name: Test packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: test-packages
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ secrets.TURBO_TEAM }}

      - name: Jest cache
        uses: actions/cache@v5
        with:
          path: |
            packages/atproto/.jest-cache
            packages/pokemon/.jest-cache
            packages/posthog/.jest-cache
            packages/supabase/.jest-cache
            packages/tournaments/.jest-cache
            packages/utils/.jest-cache
            packages/validators/.jest-cache
          key: jest-packages-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('**/pnpm-lock.yaml', '**/jest.config.*', 'tooling/test-utils/jest-config.cjs') }}
          restore-keys: |
            jest-packages-${{ runner.os }}-${{ github.ref }}-
            jest-packages-${{ runner.os }}-refs/heads/main-

      - name: Run tests
        run: pnpm turbo run test --filter='./packages/*' --ui stream
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_CLASSNAME: "{classname}"
          JEST_JUNIT_TITLE: "{title}"
          JEST_JUNIT_ANCESTOR_SEPARATOR: " › "
          JEST_JUNIT_ADD_FILE_ATTRIBUTE: "true"

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "**/test-results/**/*.xml"
          check_name: Test Results / packages
          comment_title: "Test Results / packages"
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/coverage/lcov.info"
          fail_ci_if_error: false

  # ── Wait for Vercel preview (shared by E2E + Lighthouse) ───
  wait-for-preview:
    name: Wait for Preview
    # Skip for Dependabot PRs — they can't access secrets needed for bypass auth,
    # and dependency bumps don't need E2E/Lighthouse validation
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    outputs:
      url: ${{ steps.vercel-preview.outputs.url }}
    steps:
      - name: Wait for Vercel preview deployment
        id: vercel-preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          GH_REPO: ${{ github.repository }}
        run: |
          echo "Waiting for Vercel preview deployment for $PR_SHA..."

          for i in $(seq 1 40); do
            DEPLOY_ID=$(gh api "repos/$GH_REPO/deployments?sha=$PR_SHA&environment=Preview" \
              --jq '.[0].id // empty' 2>/dev/null || true)

            if [ -n "$DEPLOY_ID" ]; then
              # Check if Vercel skipped this deployment (e.g. "Skipped - Not affected")
              DEPLOY_DESC=$(gh api "repos/$GH_REPO/deployments/$DEPLOY_ID/statuses" \
                --jq '.[0].description // empty' 2>/dev/null || true)

              if echo "$DEPLOY_DESC" | grep -qi "skipped"; then
                echo "Deployment was skipped by Vercel ($DEPLOY_DESC)"
                echo "Falling back to latest successful preview deployment..."

                # Find the most recent non-skipped preview deployment
                FALLBACK_ID=$(gh api "repos/$GH_REPO/deployments?environment=Preview&per_page=10" \
                  --jq '[.[] | select(.sha != env.PR_SHA)] | .[0].id // empty' 2>/dev/null || true)

                if [ -n "$FALLBACK_ID" ]; then
                  URL=$(gh api "repos/$GH_REPO/deployments/$FALLBACK_ID/statuses" \
                    --jq '[.[] | select(.environment_url != null and .environment_url != "")] | .[0].environment_url // empty' 2>/dev/null || true)

                  if [ -n "$URL" ]; then
                    BODY=$(curl -s -H "x-vercel-protection-bypass: $BYPASS_SECRET" "$URL" | head -c 5000)
                    if ! echo "$BODY" | grep -qi "Deployment was cancelled\|deployment not found\|deployment error"; then
                      echo "url=$URL" >> "$GITHUB_OUTPUT"
                      echo "Using fallback preview at $URL"
                      exit 0
                    fi
                  fi
                fi

                echo "No usable fallback deployment found (attempt $i/40)"
                sleep 15
                continue
              fi

              # Get environment_url from latest status (Vercel uses "inactive" state, not "success")
              URL=$(gh api "repos/$GH_REPO/deployments/$DEPLOY_ID/statuses" \
                --jq '.[0].environment_url // empty' 2>/dev/null || true)

              if [ -n "$URL" ]; then
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                  -H "x-vercel-protection-bypass: $BYPASS_SECRET" "$URL")

                if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
                  # Verify the page isn't a Vercel error/cancelled deployment page
                  BODY=$(curl -s -H "x-vercel-protection-bypass: $BYPASS_SECRET" "$URL" | head -c 5000)
                  if echo "$BODY" | grep -qi "Deployment was cancelled\|deployment not found\|deployment error"; then
                    echo "Deployment at $URL shows error page (attempt $i/40)"
                  else
                    echo "url=$URL" >> "$GITHUB_OUTPUT"
                    echo "Preview ready at $URL (HTTP $STATUS)"
                    exit 0
                  fi
                fi
                echo "Deployment returned HTTP $STATUS (attempt $i/40)"
              else
                echo "Deployment $DEPLOY_ID not ready yet (attempt $i/40)"
              fi
            else
              echo "No deployment found yet (attempt $i/40)"
            fi

            sleep 15
          done

          echo "::error::Timeout waiting for Vercel preview deployment"
          exit 1

  # ── E2E tests (Playwright) ─────────────────────────────────
  e2e-tests:
    name: E2E Tests
    # Skip for Dependabot PRs — no access to secrets for bypass auth
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [install, wait-for-preview]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: e2e
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ secrets.TURBO_TEAM }}

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --filter=@trainers/web exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter=@trainers/web exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter=@trainers/web exec playwright install-deps chromium

      - name: Seed E2E test users on preview
        id: e2e-seed
        if: needs.wait-for-preview.outputs.url != ''
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.wait-for-preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "Seeding E2E test users on $PLAYWRIGHT_BASE_URL..."
          RESPONSE=$(curl -s --max-time 30 --connect-timeout 5 --retry 3 --retry-delay 2 --retry-connrefused -w "\n%{http_code}" -X POST \
            -H "x-e2e-seed-secret: $VERCEL_AUTOMATION_BYPASS_SECRET" \
            -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" \
            "$PLAYWRIGHT_BASE_URL/api/e2e/seed" || true)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Response (HTTP $HTTP_CODE): $BODY"
          if [ "$HTTP_CODE" = "404" ]; then
            echo "::error::E2E seed returned 404 — preview is likely connected to the production database. Skipping E2E tests to prevent production pollution."
            echo "safe=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$HTTP_CODE" ] || ! [ "$HTTP_CODE" -eq "$HTTP_CODE" ] 2>/dev/null; then
            echo "::warning::E2E seed request failed (curl error) — tests may fail if users don't exist"
            echo "safe=true" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ] || [ "$HTTP_CODE" -eq 207 ]; then
            echo "::warning::E2E seed returned HTTP $HTTP_CODE — tests may fail if users don't exist"
            echo "safe=true" >> "$GITHUB_OUTPUT"
          else
            echo "safe=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run E2E tests
        if: steps.e2e-seed.outputs.safe != 'false'
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ needs.wait-for-preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: pnpm --filter=@trainers/web exec playwright test

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload JUnit XML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: junit-report
          path: apps/web/test-results/junit.xml
          retention-days: 7

      - name: Upload test traces (on failure)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

      - name: Publish E2E test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: apps/web/test-results/junit.xml
          check_name: E2E Test Results
          comment_title: E2E Test Results
          comment_mode: always
          compare_to_earlier_commit: true
          report_individual_runs: true
          deduplicate_classes_by_file_name: false

  # ── Lighthouse CI (performance audit against preview) ──────
  lighthouse:
    name: Lighthouse
    # Skip for Dependabot PRs — no access to secrets for bypass auth
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [wait-for-preview]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        with:
          urls: ${{ needs.wait-for-preview.outputs.url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.cjs
