name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".vscode/**"
      - "LICENSE"
      - ".gitignore"
      - "infra/**"
      - ".claude/**"
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"
      - ".vscode/**"
      - "LICENSE"
      - ".gitignore"
      - "infra/**"
      - ".claude/**"

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: read
  pull-requests: write
  checks: write

jobs:
  # ── Shared dependency installation ─────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=node-modules-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}" >> "$GITHUB_OUTPUT"

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            tooling/*/node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
        env:
          CI: true
          GITHUB_ACTIONS: true

  # ── Quality checks (lint + typecheck) ──────────────────────
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: quality
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}

      - name: ESLint cache
        uses: actions/cache@v5
        with:
          path: |
            apps/*/.eslintcache
            packages/*/.eslintcache
            tooling/*/.eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/.eslintrc.*', '**/eslint.config.*') }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            eslint-${{ runner.os }}-

      - name: TypeScript cache
        uses: actions/cache@v5
        with:
          path: |
            apps/*/tsconfig.tsbuildinfo
            packages/*/tsconfig.tsbuildinfo
            packages/*/dist/tsconfig.tsbuildinfo
          key: tsc-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/tsconfig*.json') }}
          restore-keys: |
            tsc-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            tsc-${{ runner.os }}-

      # Register problem matchers so ESLint and tsc errors become
      # inline annotations on the PR Files tab.
      - name: Register problem matchers
        run: |
          echo "::add-matcher::.github/matchers/eslint-stylish.json"
          echo "::add-matcher::.github/matchers/tsc.json"

      - name: Lint
        run: pnpm turbo run lint --log-prefix=none

      - name: Typecheck
        run: pnpm turbo run typecheck --log-prefix=none

  # ── Unit tests (Jest) — 3 jobs: web, mobile, packages ─────
  test-web:
    name: Test @trainers/web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: test-web
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}

      - name: Jest cache
        uses: actions/cache@v5
        with:
          path: apps/web/.jest-cache
          key: jest-web-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('**/pnpm-lock.yaml', '**/jest.config.*', 'tooling/test-utils/jest-config.cjs') }}
          restore-keys: |
            jest-web-${{ runner.os }}-${{ github.ref }}-
            jest-web-${{ runner.os }}-refs/heads/main-

      - name: Run tests
        run: pnpm turbo run test --filter=@trainers/web --ui stream
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_CLASSNAME: "{classname}"
          JEST_JUNIT_TITLE: "{title}"
          JEST_JUNIT_ANCESTOR_SEPARATOR: " › "
          JEST_JUNIT_ADD_FILE_ATTRIBUTE: "true"

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "**/test-results/**/*.xml"
          check_name: Test Results / web
          comment_title: "Test Results / web"
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/coverage/lcov.info"
          fail_ci_if_error: false

  test-mobile:
    name: Test @trainers/mobile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: test-mobile
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}

      - name: Jest cache
        uses: actions/cache@v5
        with:
          path: apps/mobile/.jest-cache
          key: jest-mobile-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('**/pnpm-lock.yaml', '**/jest.config.*', 'tooling/test-utils/jest-config.cjs') }}
          restore-keys: |
            jest-mobile-${{ runner.os }}-${{ github.ref }}-
            jest-mobile-${{ runner.os }}-refs/heads/main-

      - name: Run tests
        run: pnpm turbo run test --filter=@trainers/mobile --ui stream
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_CLASSNAME: "{classname}"
          JEST_JUNIT_TITLE: "{title}"
          JEST_JUNIT_ANCESTOR_SEPARATOR: " › "
          JEST_JUNIT_ADD_FILE_ATTRIBUTE: "true"

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "**/test-results/**/*.xml"
          check_name: Test Results / mobile
          comment_title: "Test Results / mobile"
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/coverage/lcov.info"
          fail_ci_if_error: false

  test-packages:
    name: Test packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: test-packages
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}

      - name: Jest cache
        uses: actions/cache@v5
        with:
          path: |
            packages/atproto/.jest-cache
            packages/pokemon/.jest-cache
            packages/posthog/.jest-cache
            packages/supabase/.jest-cache
            packages/tournaments/.jest-cache
            packages/utils/.jest-cache
            packages/validators/.jest-cache
          key: jest-packages-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('**/pnpm-lock.yaml', '**/jest.config.*', 'tooling/test-utils/jest-config.cjs') }}
          restore-keys: |
            jest-packages-${{ runner.os }}-${{ github.ref }}-
            jest-packages-${{ runner.os }}-refs/heads/main-

      - name: Run tests
        run: pnpm turbo run test --filter='./packages/*' --ui stream
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_CLASSNAME: "{classname}"
          JEST_JUNIT_TITLE: "{title}"
          JEST_JUNIT_ANCESTOR_SEPARATOR: " › "
          JEST_JUNIT_ADD_FILE_ATTRIBUTE: "true"

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "**/test-results/**/*.xml"
          check_name: Test Results / packages
          comment_title: "Test Results / packages"
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/coverage/lcov.info"
          fail_ci_if_error: false

  # ── E2E preparation (parallel with preview wait) ──────────
  e2e-prepare:
    name: E2E Prepare (browsers)
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    outputs:
      playwright-version: ${{ steps.playwright-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: e2e-prepare
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --filter=@trainers/web exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter=@trainers/web exec playwright install --with-deps chromium

      - name: Cache Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives/*.deb
          key: playwright-apt-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter=@trainers/web exec playwright install-deps chromium

  # ── Create/find Supabase preview branch + inject env vars ───
  setup-preview-db:
    name: Setup Preview DB
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    outputs:
      branch-ref: ${{ steps.branch.outputs.ref }}
    steps:
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Create or find Supabase branch
        id: branch
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          GIT_BRANCH: ${{ github.head_ref }}
        run: |
          # Check if branch already exists
          EXISTING=$(supabase --experimental branches list --project-ref "$PROJECT_REF" --output json \
            | jq -r --arg name "$GIT_BRANCH" '.[] | select(.git_branch == $name) | .id // empty')

          if [ -z "$EXISTING" ]; then
            echo "Creating Supabase branch for $GIT_BRANCH..."
            supabase --experimental branches create "$GIT_BRANCH" --project-ref "$PROJECT_REF"
          else
            echo "Supabase branch already exists for $GIT_BRANCH"
          fi

          # Get branch credentials and extract project ref.
          # branches get returns: { "POSTGRES_URL_NON_POOLING": "...db.<ref>.supabase.co...", ... }
          for i in $(seq 1 30); do
            INFO=$(supabase --experimental branches get "$GIT_BRANCH" --project-ref "$PROJECT_REF" --output json 2>&1) || true
            NON_POOLING=$(echo "$INFO" | jq -r '.POSTGRES_URL_NON_POOLING // empty' 2>/dev/null)

            if [ -n "$NON_POOLING" ]; then
              # Mask all sensitive values from the response before any further output
              for KEY in POSTGRES_URL POSTGRES_URL_NON_POOLING SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY POSTGRES_PASSWORD SUPABASE_DEFAULT_KEY; do
                VAL=$(echo "$INFO" | jq -r ".${KEY} // empty" 2>/dev/null)
                if [ -n "$VAL" ]; then
                  echo "::add-mask::$VAL"
                fi
              done

              BRANCH_REF=$(echo "$NON_POOLING" | grep -oP 'db\.\K[a-z0-9]+(?=\.supabase\.co)')
              if [ -n "$BRANCH_REF" ]; then
                echo "ref=$BRANCH_REF" >> "$GITHUB_OUTPUT"
                echo "Branch ready: $BRANCH_REF"
                exit 0
              fi
            fi

            echo "Waiting for branch credentials (attempt $i/30)"
            sleep 10
          done
          echo "::error::Supabase branch did not return credentials within 5 minutes"
          exit 1

      - name: Inject env vars into Vercel
        if: steps.branch.outputs.ref != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          BRANCH_REF: ${{ steps.branch.outputs.ref }}
          GIT_BRANCH: ${{ github.head_ref }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          # branches get returns all credentials in one call
          INFO=$(supabase --experimental branches get "$GIT_BRANCH" --project-ref "$PROJECT_REF" --output json)
          ANON_KEY=$(echo "$INFO" | jq -r '.SUPABASE_ANON_KEY // empty')
          SERVICE_KEY=$(echo "$INFO" | jq -r '.SUPABASE_SERVICE_ROLE_KEY // empty')
          DB_PASSWORD=$(echo "$INFO" | jq -r '.POSTGRES_PASSWORD // empty')
          API_URL="https://${BRANCH_REF}.supabase.co"

          # Mask all dynamic credentials so they never appear in logs
          echo "::add-mask::$ANON_KEY"
          echo "::add-mask::$SERVICE_KEY"
          echo "::add-mask::$DB_PASSWORD"

          # Upsert branch-scoped Preview env vars via Vercel API
          ENV_VARS=$(jq -n \
            --arg url "$API_URL" \
            --arg anon "$ANON_KEY" \
            --arg svc "$SERVICE_KEY" \
            --arg pass "$DB_PASSWORD" \
            --arg branch "$GIT_BRANCH" \
            '[
              {"key":"NEXT_PUBLIC_SUPABASE_URL","value":$url,"type":"encrypted","target":["preview"],"gitBranch":$branch},
              {"key":"NEXT_PUBLIC_SUPABASE_ANON_KEY","value":$anon,"type":"encrypted","target":["preview"],"gitBranch":$branch},
              {"key":"SUPABASE_URL","value":$url,"type":"encrypted","target":["preview"],"gitBranch":$branch},
              {"key":"SUPABASE_SERVICE_ROLE_KEY","value":$svc,"type":"sensitive","target":["preview"],"gitBranch":$branch},
              {"key":"POSTGRES_PASSWORD","value":$pass,"type":"sensitive","target":["preview"],"gitBranch":$branch}
            ]')

          RESPONSE=$(curl -sf -X POST \
            "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?upsert=true&teamId=$VERCEL_TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$ENV_VARS")

          FAILED=$(echo "$RESPONSE" | jq '.failed | length')
          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::Some Vercel env vars failed to set"
            echo "$RESPONSE" | jq '.failed'
          fi
          echo "Vercel env vars upserted for branch $GIT_BRANCH"

  # ── Wait for Vercel preview (shared by E2E + Lighthouse) ────
  deploy-preview:
    name: Wait for Preview
    # Skip for Dependabot PRs — they can't access secrets needed for bypass auth,
    # and dependency bumps don't need E2E/Lighthouse validation
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [setup-preview-db]
    outputs:
      url: ${{ steps.redeploy.outputs.url || steps.detect.outputs.url }}
      branch-db-ready: ${{ steps.branch-recheck.outputs.ready || steps.branch-check.outputs.ready }}
    steps:
      - name: Wait for Vercel preview deployment
        id: detect
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Waiting for Vercel preview deployment for $PR_SHA..."

          for i in $(seq 1 40); do
            # Query Vercel REST API directly — more reliable than GitHub Deployments API
            RESPONSE=$(curl -sf --max-time 10 -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?sha=$PR_SHA&limit=1&projectId=$VERCEL_PROJECT_ID&slug=$VERCEL_TEAM_ID" \
              2>/dev/null) || RESPONSE=""

            if [ -z "$RESPONSE" ]; then
              echo "API request failed (attempt $i/40)"
              sleep 15
              continue
            fi

            STATE=$(echo "$RESPONSE" | jq -r '.deployments[0].state // empty')
            DEPLOY_URL=$(echo "$RESPONSE" | jq -r '.deployments[0].url // empty')

            if [ "$STATE" = "READY" ] && [ -n "$DEPLOY_URL" ]; then
              FULL_URL="https://$DEPLOY_URL"

              # Verify it's accessible
              STATUS=$(curl -sf --max-time 10 -o /dev/null -w "%{http_code}" \
                -H "x-vercel-protection-bypass: $BYPASS_SECRET" "$FULL_URL" \
                2>/dev/null) || STATUS="000"

              if [ "$STATUS" -ge 200 ] 2>/dev/null && [ "$STATUS" -lt 400 ] 2>/dev/null; then
                echo "url=$FULL_URL" >> "$GITHUB_OUTPUT"
                echo "Preview ready at $FULL_URL (HTTP $STATUS)"
                exit 0
              fi
              echo "Deployment at $FULL_URL returned HTTP $STATUS (attempt $i/40)"
            elif [ -n "$STATE" ]; then
              echo "Deployment state: $STATE (attempt $i/40)"
            else
              echo "No deployment found yet (attempt $i/40)"
            fi

            sleep 15
          done

          echo "::error::Timeout waiting for Vercel preview deployment"
          exit 1

      - name: Check Supabase branch DB readiness
        id: branch-check
        if: steps.detect.outputs.url != ''
        env:
          PREVIEW_URL: ${{ steps.detect.outputs.url }}
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          RESPONSE=$(curl -sf --max-time 10 \
            -H "x-vercel-protection-bypass: $BYPASS_SECRET" \
            "$PREVIEW_URL/api/e2e/seed" 2>/dev/null) || RESPONSE=""

          if [ -z "$RESPONSE" ]; then
            echo "::warning::Could not reach seed endpoint for branch DB check"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SAFE=$(echo "$RESPONSE" | jq -r '.safe // false')
          REASON=$(echo "$RESPONSE" | jq -r '.reason // empty')

          if [ "$SAFE" = "true" ]; then
            echo "Supabase branch DB is ready"
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Supabase branch DB not available: $REASON"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger redeployment if needed
        id: redeploy
        if: steps.branch-check.outputs.ready != 'true' && needs.setup-preview-db.outputs.branch-ref != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          GIT_BRANCH: ${{ github.head_ref }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Branch DB is now ready but deployment predates env var injection — triggering redeployment..."

          REPO_ID=$(curl -sf -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}" | jq -r '.id')

          RESPONSE=$(curl -sf -X POST \
            "https://api.vercel.com/v13/deployments?teamId=$VERCEL_TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg name "$VERCEL_PROJECT_ID" \
              --arg project "$VERCEL_PROJECT_ID" \
              --arg branch "$GIT_BRANCH" \
              --arg sha "$PR_SHA" \
              --argjson repoId "$REPO_ID" \
              '{
                name: $name,
                project: $project,
                target: "preview",
                gitSource: {
                  type: "github",
                  repoId: $repoId,
                  ref: $branch,
                  sha: $sha
                }
              }')")

          DEPLOY_URL=$(echo "$RESPONSE" | jq -r '.url // empty')

          if [ -z "$DEPLOY_URL" ]; then
            echo "::warning::Failed to trigger redeployment"
            exit 0
          fi

          FULL_URL="https://$DEPLOY_URL"
          echo "Redeployment triggered: $FULL_URL — polling for readiness..."

          for i in $(seq 1 40); do
            STATUS=$(curl -sf --max-time 10 -o /dev/null -w "%{http_code}" \
              -H "x-vercel-protection-bypass: $BYPASS_SECRET" "$FULL_URL" \
              2>/dev/null) || STATUS="000"

            if [ "$STATUS" -ge 200 ] 2>/dev/null && [ "$STATUS" -lt 400 ] 2>/dev/null; then
              echo "url=$FULL_URL" >> "$GITHUB_OUTPUT"
              echo "Redeployment ready at $FULL_URL (HTTP $STATUS)"
              exit 0
            fi
            echo "Redeployment returned HTTP $STATUS (attempt $i/40)"
            sleep 15
          done

          echo "::warning::Redeployment did not become accessible in time"

      - name: Re-check branch DB readiness
        id: branch-recheck
        if: steps.redeploy.outputs.url != ''
        env:
          PREVIEW_URL: ${{ steps.redeploy.outputs.url }}
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          RESPONSE=$(curl -sf --max-time 10 \
            -H "x-vercel-protection-bypass: $BYPASS_SECRET" \
            "$PREVIEW_URL/api/e2e/seed" 2>/dev/null) || RESPONSE=""

          if [ -z "$RESPONSE" ]; then
            echo "::warning::Could not reach seed endpoint on redeployment for branch DB check"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SAFE=$(echo "$RESPONSE" | jq -r '.safe // false')
          REASON=$(echo "$RESPONSE" | jq -r '.reason // empty')

          if [ "$SAFE" = "true" ]; then
            echo "Supabase branch DB is ready after redeployment"
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Supabase branch DB not available after redeployment: $REASON"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  # ── E2E tests (Playwright) ─────────────────────────────────
  e2e-tests:
    name: E2E Tests
    # Skip for Dependabot PRs — no access to secrets for bypass auth
    # Skip when Supabase branch DB is not available (no production pollution)
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      needs.deploy-preview.outputs.branch-db-ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [install, e2e-prepare, deploy-preview]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: e2e
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}

      - name: Restore Playwright browsers
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.e2e-prepare.outputs.playwright-version }}
          fail-on-cache-miss: true

      - name: Restore Playwright system deps cache
        uses: actions/cache/restore@v5
        with:
          path: /var/cache/apt/archives/*.deb
          key: playwright-apt-${{ runner.os }}-${{ needs.e2e-prepare.outputs.playwright-version }}

      - name: Install Playwright system deps
        run: pnpm --filter=@trainers/web exec playwright install-deps chromium

      - name: Seed E2E test users on preview
        id: e2e-seed
        if: needs.deploy-preview.outputs.url != ''
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "Seeding E2E test users on $PLAYWRIGHT_BASE_URL..."
          RESPONSE=$(curl -s --max-time 30 --connect-timeout 5 --retry 3 --retry-delay 2 --retry-connrefused -w "\n%{http_code}" -X POST \
            -H "x-e2e-seed-secret: $VERCEL_AUTOMATION_BYPASS_SECRET" \
            -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" \
            "$PLAYWRIGHT_BASE_URL/api/e2e/seed" || true)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Response (HTTP $HTTP_CODE): $BODY"
          if [ -n "$HTTP_CODE" ] && [[ "$HTTP_CODE" =~ ^[0-9]+$ ]] && [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Seed completed successfully"
          else
            echo "::warning::E2E seed returned HTTP $HTTP_CODE — tests may fail if users don't exist"
          fi

      - name: Run E2E tests
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: pnpm --filter=@trainers/web exec playwright test

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload JUnit XML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: junit-report
          path: apps/web/test-results/junit.xml
          retention-days: 7

      - name: Upload test traces (on failure)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

      - name: Publish E2E test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: apps/web/test-results/junit.xml
          check_name: E2E Test Results
          comment_title: E2E Test Results
          comment_mode: always
          compare_to_earlier_commit: true
          report_individual_runs: true
          deduplicate_classes_by_file_name: false

  # ── Lighthouse CI (performance audit against preview) ──────
  lighthouse:
    name: Lighthouse
    # Skip for Dependabot PRs — no access to secrets for bypass auth
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-preview]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        with:
          urls: ${{ needs.deploy-preview.outputs.url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.cjs
