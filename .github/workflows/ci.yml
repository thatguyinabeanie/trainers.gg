name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".vscode/**"
      - "LICENSE"
      - ".gitignore"
      - "infra/**"
      - ".claude/**"
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"
      - ".vscode/**"
      - "LICENSE"
      - ".gitignore"
      - "infra/**"
      - ".claude/**"

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: read
  pull-requests: write
  checks: write

jobs:
  # ── Shared dependency installation ─────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: pnpm/action-setup@v6.0.8 # pinned: early v6 had lockfile/PATH bugs

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=node-modules-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}" >> "$GITHUB_OUTPUT"

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-modules-cache
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            tooling/*/node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
        env:
          CI: true
          GITHUB_ACTIONS: true

  # ── Quality checks (lint + typecheck, run in parallel) ─────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: lint
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}

      - name: ESLint cache
        uses: actions/cache@v5
        with:
          path: |
            apps/*/.eslintcache
            packages/*/.eslintcache
            tooling/*/.eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/.eslintrc.*', '**/eslint.config.*') }}
          restore-keys: |
            eslint-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            eslint-${{ runner.os }}-

      # Register ESLint problem matcher so errors become inline PR annotations.
      - name: Register ESLint problem matcher
        run: echo "::add-matcher::.github/matchers/eslint-stylish.json"

      - name: Lint
        run: pnpm turbo run lint --log-prefix=none

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: typecheck
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}

      - name: TypeScript cache
        uses: actions/cache@v5
        with:
          path: |
            apps/*/tsconfig.tsbuildinfo
            packages/*/tsconfig.tsbuildinfo
            packages/*/dist/tsconfig.tsbuildinfo
          key: tsc-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', '**/tsconfig*.json') }}
          restore-keys: |
            tsc-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            tsc-${{ runner.os }}-

      # Register tsc problem matcher so errors become inline PR annotations.
      - name: Register tsc problem matcher
        run: echo "::add-matcher::.github/matchers/tsc.json"

      - name: Typecheck
        run: pnpm turbo run typecheck --log-prefix=none

  # ── Unit tests (Jest) — web (sharded x2), mobile, packages ─────
  test-web:
    name: Test @trainers/web (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: test-web-${{ matrix.shard }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}

      - name: Jest cache
        uses: actions/cache@v5
        with:
          path: apps/web/.jest-cache
          # Shard-distinct key: both shards save independently without colliding.
          key: jest-web-${{ matrix.shard }}-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('**/pnpm-lock.yaml', '**/jest.config.*', 'tooling/test-utils/jest-config.cjs') }}
          restore-keys: |
            jest-web-${{ matrix.shard }}-${{ runner.os }}-${{ github.ref }}-
            jest-web-${{ matrix.shard }}-${{ runner.os }}-refs/heads/main-

      # Build only @trainers/web's dependencies (turbo remote cache makes this
      # fast), then run jest directly with --shard. Bypassing `turbo run test`
      # is required to pass --shard; CI=true still auto-enables coverage + junit
      # via the shared jest config. Coverage goes to a shard-distinct dir so the
      # two shards' lcov files never overwrite each other on artifact merge.
      - name: Run tests (shard ${{ matrix.shard }})
        run: |
          pnpm turbo run build --filter=@trainers/web^...
          pnpm --filter @trainers/web exec jest \
            --shard=${{ matrix.shard }}/2 \
            --ci \
            --coverageDirectory=coverage/shard-${{ matrix.shard }}
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_CLASSNAME: "{classname}"
          JEST_JUNIT_TITLE: "{title}"
          JEST_JUNIT_ANCESTOR_SEPARATOR: " › "
          JEST_JUNIT_ADD_FILE_ATTRIBUTE: "true"

      - name: Upload JUnit results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: junit-web-${{ matrix.shard }}
          path: "**/test-results/**/*.xml"
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-web-${{ matrix.shard }}
          path: "**/coverage/shard-${{ matrix.shard }}/lcov.info"
          retention-days: 1
          if-no-files-found: ignore

  test-mobile:
    name: Test @trainers/mobile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: test-mobile
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}

      - name: Jest cache
        uses: actions/cache@v5
        with:
          path: apps/mobile/.jest-cache
          key: jest-mobile-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('**/pnpm-lock.yaml', '**/jest.config.*', 'tooling/test-utils/jest-config.cjs') }}
          restore-keys: |
            jest-mobile-${{ runner.os }}-${{ github.ref }}-
            jest-mobile-${{ runner.os }}-refs/heads/main-

      - name: Run tests
        run: pnpm turbo run test --filter=@trainers/mobile --ui stream
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_CLASSNAME: "{classname}"
          JEST_JUNIT_TITLE: "{title}"
          JEST_JUNIT_ANCESTOR_SEPARATOR: " › "
          JEST_JUNIT_ADD_FILE_ATTRIBUTE: "true"

      - name: Upload JUnit results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: junit-mobile
          path: "**/test-results/**/*.xml"
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-mobile
          path: "**/coverage/lcov.info"
          retention-days: 1
          if-no-files-found: ignore

  test-packages:
    name: Test packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: test-packages
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}

      - name: Jest cache
        uses: actions/cache@v5
        with:
          path: |
            packages/atproto/.jest-cache
            packages/pokemon/.jest-cache
            packages/posthog/.jest-cache
            packages/supabase/.jest-cache
            packages/tournaments/.jest-cache
            packages/utils/.jest-cache
            packages/validators/.jest-cache
          key: jest-packages-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('**/pnpm-lock.yaml', '**/jest.config.*', 'tooling/test-utils/jest-config.cjs') }}
          restore-keys: |
            jest-packages-${{ runner.os }}-${{ github.ref }}-
            jest-packages-${{ runner.os }}-refs/heads/main-

      - name: Run tests
        run: pnpm turbo run test --filter='./packages/*' --ui stream
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_CLASSNAME: "{classname}"
          JEST_JUNIT_TITLE: "{title}"
          JEST_JUNIT_ANCESTOR_SEPARATOR: " › "
          JEST_JUNIT_ADD_FILE_ATTRIBUTE: "true"

      - name: Upload JUnit results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: junit-packages
          path: "**/test-results/**/*.xml"
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-packages
          path: "**/coverage/lcov.info"
          retention-days: 1
          if-no-files-found: ignore

  # ── Consolidated test-result publishing (one check, correct attribution) ──
  # Single EnricoMi invocation reading all jobs' JUnit XML from artifacts.
  # Running it per-job creates multiple check runs from the same app in one
  # run, which GitHub mis-attributes to the wrong sibling job. One job = one
  # correctly-named "Test Results" check. See EnricoMi action issue #181.
  test-results:
    name: Test Results
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test-web, test-mobile, test-packages, e2e-tests]
    if: always() # publish even when a test job failed or e2e was skipped
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download all JUnit artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: junit-*
          path: junit

      - name: Publish consolidated test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "junit/**/*.xml"
          check_name: "Test Results"
          comment_title: "Test Results"
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}
          report_individual_runs: true

  # ── Coverage reporting (single aggregated upload) ──────────
  coverage:
    name: Upload Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test-web, test-mobile, test-packages]
    if: always()
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: true
          path: coverage

      - name: Upload combined coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage
          fail_ci_if_error: false

  # ── E2E preparation (parallel with preview wait) ──────────
  e2e-prepare:
    name: E2E Prepare (browsers)
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    outputs:
      playwright-version: ${{ steps.playwright-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: e2e-prepare
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --filter=@trainers/web exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter=@trainers/web exec playwright install --with-deps chromium

      - name: Cache Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives/*.deb
          key: playwright-apt-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter=@trainers/web exec playwright install-deps chromium

  # ── Setup Supabase branch + wait for Vercel preview ─────────
  deploy-preview:
    name: Wait for Preview
    # Skip for Dependabot PRs — they can't access secrets needed for bypass auth,
    # and dependency bumps don't need E2E/Lighthouse validation
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    # Increased from 15 to 30: worst case is initial wait (~13m) + redeploy +
    # second by-id wait (~10m) + checkout/branch/env-inject overhead, which can
    # approach ~28m. 30 keeps the step-7 diagnostic + explicit exit 1 reachable.
    timeout-minutes: 30
    outputs:
      url: ${{ steps.final-url.outputs.url }}
      branch-db-ready: ${{ steps.db-check-second.outputs.ready || steps.db-check-first.outputs.ready }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      # Step 1: Create or find the Supabase preview branch — unchanged.
      - uses: ./.github/actions/supabase-branch
        id: branch
        with:
          access-token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          project-ref: ${{ secrets.SUPABASE_PROJECT_REF }}
          git-branch: ${{ github.head_ref }}

      # Step 2: Inject branch-scoped Preview env vars into Vercel BEFORE evaluating
      # the auto-deploy. This guarantees the env vars exist when we later redeploy.
      - uses: ./.github/actions/inject-preview-env
        if: steps.branch.outputs.ref != ''
        with:
          branch-ref: ${{ steps.branch.outputs.ref }}
          git-branch: ${{ github.head_ref }}
          supabase-access-token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          supabase-project-ref: ${{ secrets.SUPABASE_PROJECT_REF }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}

      # Step 3: Wait for the auto-deploy (triggered by git push) to reach a terminal
      # state. Returns url (empty string on ERROR) and deployment-id.
      - uses: ./.github/actions/wait-for-preview
        id: preview-auto
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          pr-sha: ${{ github.event.pull_request.head.sha }}
          git-branch: ${{ github.head_ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Step 4: First branch-DB check against the auto-deploy URL.
      - uses: ./.github/actions/check-branch-db
        id: db-check-first
        if: steps.preview-auto.outputs.url != ''
        with:
          preview-url: ${{ steps.preview-auto.outputs.url }}
          bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      # Step 5: If the auto-deploy built before env injection (branch-db not ready)
      # OR the auto-deploy errored, trigger ONE redeploy via v13 POST with gitSource.
      # This new deploy will read the CURRENT branch-scoped env vars set in step 2.
      - name: Trigger redeploy (env-injection race or auto-deploy error)
        id: redeploy
        if: >-
          steps.preview-auto.outputs.url == '' ||
          steps.db-check-first.outputs.ready != 'true'
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          GIT_BRANCH: ${{ github.head_ref }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering fresh deployment with updated branch env vars..."

          REPO_ID=$(curl -sS --max-time 10 \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}" \
            | jq -r '.id // empty')

          if [ -z "$REPO_ID" ] || [ "$REPO_ID" = "null" ]; then
            echo "::error::Could not retrieve GitHub repo ID — cannot trigger redeployment"
            exit 1
          fi

          PAYLOAD=$(jq -n \
            --arg name "$VERCEL_PROJECT_ID" \
            --arg project "$VERCEL_PROJECT_ID" \
            --arg branch "$GIT_BRANCH" \
            --arg sha "$PR_SHA" \
            --argjson repoId "$REPO_ID" \
            '{
              name: $name,
              project: $project,
              gitSource: {
                type: "github",
                repoId: $repoId,
                ref: $branch,
                sha: $sha
              }
            }')

          HTTP_FILE=$(mktemp)
          HTTP_CODE=$(curl -sS --max-time 30 \
            -o "$HTTP_FILE" \
            -w "%{http_code}" \
            -X POST \
            "https://api.vercel.com/v13/deployments?teamId=$VERCEL_TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          BODY=$(cat "$HTTP_FILE")
          rm -f "$HTTP_FILE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::v13 POST /deployments returned HTTP $HTTP_CODE: $BODY"
            exit 1
          fi

          NEW_ID=$(echo "$BODY" | jq -r '.id // empty')
          if [ -z "$NEW_ID" ] || [ "$NEW_ID" = "null" ]; then
            echo "::error::POST response missing deployment id: $BODY"
            exit 1
          fi

          echo "deployment-id=$NEW_ID" >> "$GITHUB_OUTPUT"
          echo "Redeployment triggered: $NEW_ID"

      # Step 5 (continued): Poll the specific redeployment by ID until READY.
      # Uses wait-for-preview with deployment-id input so it polls
      # GET /v13/deployments/{id} (readyState field, not state).
      - uses: ./.github/actions/wait-for-preview
        id: preview-redeploy
        if: steps.redeploy.outputs.deployment-id != ''
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          pr-sha: ${{ github.event.pull_request.head.sha }}
          git-branch: ${{ github.head_ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deployment-id: ${{ steps.redeploy.outputs.deployment-id }}

      # Step 6: Second branch-DB check against the redeployment URL.
      - uses: ./.github/actions/check-branch-db
        id: db-check-second
        if: steps.preview-redeploy.outputs.url != ''
        with:
          preview-url: ${{ steps.preview-redeploy.outputs.url }}
          bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      # Step 7: Fail the job if the second check is still not ready (or redeploy
      # errored). Because e2e-tests and lighthouse need this job, they will skip,
      # and the overall run goes RED — no more silent-green runs with zero E2E coverage.
      - name: Fail if branch DB still not ready after redeploy
        if: >-
          steps.redeploy.outcome == 'success' &&
          steps.db-check-second.outputs.ready != 'true'
        shell: bash
        run: |
          echo "::error::Branch DB not ready after redeployment. E2E tests cannot run against production DB."
          echo "  auto-deploy url   : ${{ steps.preview-auto.outputs.url }}"
          echo "  auto first check  : ready=${{ steps.db-check-first.outputs.ready }}"
          echo "  redeploy id       : ${{ steps.redeploy.outputs.deployment-id }}"
          echo "  redeploy url      : ${{ steps.preview-redeploy.outputs.url }}"
          echo "  second check      : ready=${{ steps.db-check-second.outputs.ready }}"
          exit 1

      # Emit the final URL (redeploy URL if a redeploy ran, otherwise auto-deploy URL).
      - name: Set final preview URL
        id: final-url
        shell: bash
        run: |
          REDEPLOY_URL="${{ steps.preview-redeploy.outputs.url }}"
          AUTO_URL="${{ steps.preview-auto.outputs.url }}"
          if [ -n "$REDEPLOY_URL" ]; then
            echo "url=$REDEPLOY_URL" >> "$GITHUB_OUTPUT"
          elif [ -n "$AUTO_URL" ]; then
            echo "url=$AUTO_URL" >> "$GITHUB_OUTPUT"
          else
            echo "url=" >> "$GITHUB_OUTPUT"
          fi

  # ── E2E tests (Playwright) ─────────────────────────────────
  e2e-tests:
    name: E2E Tests
    # Skip for Dependabot PRs — no access to secrets for bypass auth
    # Skip when Supabase branch DB is not available (no production pollution)
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      needs.deploy-preview.outputs.branch-db-ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [install, e2e-prepare, deploy-preview]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: ./.github/actions/setup
        with:
          node-modules-cache-key: ${{ needs.install.outputs.cache-key }}
          turbo-prefix: e2e
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-team-id: ${{ secrets.VERCEL_TEAM_ID }}

      - name: Restore Playwright browsers
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.e2e-prepare.outputs.playwright-version }}
          fail-on-cache-miss: true

      - name: Restore Playwright system deps cache
        uses: actions/cache/restore@v5
        with:
          path: /var/cache/apt/archives/*.deb
          key: playwright-apt-${{ runner.os }}-${{ needs.e2e-prepare.outputs.playwright-version }}

      - name: Install Playwright system deps
        run: pnpm --filter=@trainers/web exec playwright install-deps chromium

      - name: Seed E2E test users on preview
        id: e2e-seed
        if: needs.deploy-preview.outputs.url != ''
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "Seeding E2E test users on $PLAYWRIGHT_BASE_URL..."
          RESPONSE=$(curl -s --max-time 30 --connect-timeout 5 --retry 3 --retry-delay 2 --retry-connrefused -w "\n%{http_code}" -X POST \
            -H "x-e2e-seed-secret: $VERCEL_AUTOMATION_BYPASS_SECRET" \
            -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" \
            "$PLAYWRIGHT_BASE_URL/api/e2e/seed") || CURL_EXIT=$?
          if [ "${CURL_EXIT:-0}" -ne 0 ]; then
            echo "::error::curl failed with exit code $CURL_EXIT"
            exit 1
          fi
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Response (HTTP $HTTP_CODE): $BODY"
          if [ -n "$HTTP_CODE" ] && [[ "$HTTP_CODE" =~ ^[0-9]+$ ]] && [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Seed completed successfully"
          else
            echo "::error::E2E seed returned HTTP $HTTP_CODE — cannot run tests without seeded users"
            exit 1
          fi

      - name: Run E2E tests
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-preview.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: pnpm --filter=@trainers/web exec playwright test

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload JUnit XML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: junit-e2e
          path: apps/web/test-results/junit.xml
          retention-days: 7

      - name: Upload test traces (on failure)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

  # ── Lighthouse CI (performance audit against preview) ──────
  lighthouse:
    name: Lighthouse
    # Skip for Dependabot PRs — no access to secrets for bypass auth
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-preview]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        with:
          urls: ${{ needs.deploy-preview.outputs.url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.cjs
