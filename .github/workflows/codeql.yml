name: CodeQL

# DISABLED 2026-06-22: the repo is now private, and CodeQL / GitHub Advanced
# Security is not free on private repos. The automatic triggers below are
# commented out (not deleted) so this can be re-enabled by restoring them if
# Advanced Security is purchased or the repo goes public again. Only
# workflow_dispatch remains, so CodeQL never auto-runs on push/PR/schedule but
# can still be triggered manually if needed.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths-ignore:
  #     - "**.md"
  #     - ".vscode/**"
  #     - "LICENSE"
  #     - ".gitignore"
  #     - "infra/**"
  #     - ".claude/**"
  # pull_request:
  #   types: [opened, synchronize, reopened, ready_for_review]
  #   branches: [main]
  #   paths-ignore:
  #     - "**.md"
  #     - ".vscode/**"
  #     - "LICENSE"
  #     - ".gitignore"
  #     - "infra/**"
  #     - ".claude/**"
  # schedule:
  #   # Run weekly on Sundays at 3 AM UTC
  #   - cron: "0 3 * * 0"

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    # Skip on draft PRs to save CI resources
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      # Required for uploading CodeQL results
      security-events: write
      # Required for checking out code
      contents: read
      # Required for fetching internal or private CodeQL packs
      packages: read
      # Required to fetch internal or private CodeQL queries
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # Use default CodeQL query suite
          # For more configuration options, see:
          # https://github.com/github/codeql-action

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
