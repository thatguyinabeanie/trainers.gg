codecov:
  # Require CI to pass before reporting coverage status on PRs.
  # Prevents misleading green checks when tests are failing.
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        # Auto-adjusts target based on recent coverage trends.
        # Threshold set to 6% to accommodate large feature PRs that add
        # significant new source code. The auto target will naturally
        # adjust downward as the codebase grows.
        target: auto
        threshold: 6%
    patch:
      default:
        # New code should have at least 60% coverage
        target: 60%

comment:
  layout: header, diff, footer
  behavior: default
  require_changes: false

ignore:
  - "**/__tests__/**"
  - "**/*.test.{ts,tsx}"
  - "**/test-setup.ts"
  - "apps/web/src/generated/**"
  - "apps/web/src/components/ui/**"
  - "tooling/**"
  - "infra/**"
  - "*.config.*"
  # Auto-generated Supabase client wrappers (pnpm generate-clients)
  - "packages/supabase/src/clients/client.ts"
  - "packages/supabase/src/clients/server.ts"
  - "packages/supabase/src/clients/mobile.ts"
  # Edge functions run in Deno — not testable with Jest.
  # Shared helpers (_shared/) have their own tests.
  - "packages/supabase/supabase/functions/*/index.ts"
  # Next.js App Router files are presentational React components.
  # Business logic is tested via actions, mutations, queries, and validators.
  - "apps/web/src/app/**/page.tsx"
  - "apps/web/src/app/**/loading.tsx"
  - "apps/web/src/app/**/layout.tsx"
  - "apps/web/src/app/**/error.tsx"
  - "apps/web/src/app/**/columns.tsx"
  # E2E tests (Playwright) — not instrumented by Jest coverage
  - "apps/web/e2e/**"
